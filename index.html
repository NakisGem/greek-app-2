<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Greek EN">
<title>Greek ↔ English</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg:        #1a1a2e;
    --card:      #16213e;
    --panel:     #0f3460;
    --accent:    #e94560;
    --text:      #eaeaea;
    --dim:       #a0a0b0;
    --btn:       #1f4068;
    --btn-hover: #2a5298;
    --green:     #27ae60;
    --red:       #c0392b;
    --border:    #3a6ea8;
    --radius:    14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    /* respect notch / Dynamic Island / home indicator */
    padding-top:    env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
  }

  /* ── Header ── */
  header {
    background: var(--panel);
    padding: 14px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .scores {
    display: flex;
    gap: 14px;
    font-size: 0.82rem;
  }

  .scores span { color: var(--dim); }
  .scores .score-val { font-weight: 600; }
  #lbl-score  .score-val { color: var(--accent); }
  #lbl-streak .score-val { color: #f0c040; }
  #lbl-best   .score-val { color: var(--dim); }

  /* ── Word card ── */
  .card {
    background: var(--card);
    margin: 18px 16px 10px;
    border-radius: var(--radius);
    padding: 22px 20px 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .direction {
    font-size: 0.85rem;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 10px;
    min-height: 1.2em;
  }

  .word {
    font-size: clamp(1.5rem, 6vw, 2.1rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    word-break: break-word;
    min-height: 2.5em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hint {
    font-size: 0.78rem;
    color: var(--dim);
    font-style: italic;
    margin-top: 10px;
  }

  /* ── Choices ── */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px;
    flex-shrink: 0;
  }

  .choice-btn {
    background: var(--btn);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    font-weight: 600;
    min-height: 72px;
    padding: 12px 10px;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    line-height: 1.3;
    text-align: left;
    -webkit-user-select: none;
    user-select: none;
  }

  .choice-btn .lbl {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 0.9rem;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
  }

  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-btn:hover:not(:disabled)  { background: var(--btn-hover); }

  .choice-btn.correct { background: var(--green); border-color: var(--green); }
  .choice-btn.correct .lbl { background: rgba(255,255,255,0.3); }

  .choice-btn.wrong   { background: var(--red);   border-color: var(--red);   }
  .choice-btn.wrong   .lbl { background: rgba(255,255,255,0.3); }

  .choice-btn:disabled { cursor: default; }

  /* ── Feedback ── */
  .feedback {
    text-align: center;
    font-size: 1.05rem;
    font-weight: 600;
    min-height: 2.2em;
    padding: 10px 16px 4px;
    color: var(--text);
    flex-shrink: 0;
  }

  /* ── Next button ── */
  .next-wrap {
    display: flex;
    justify-content: center;
    padding: 8px 16px 14px;
    flex-shrink: 0;
  }

  #btn-next {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    padding: 14px 44px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.08s;
    -webkit-user-select: none;
    user-select: none;
  }

  #btn-next:disabled { opacity: 0.35; cursor: default; }
  #btn-next:active:not(:disabled) { transform: scale(0.97); }
</style>
</head>
<body>

<header>
  <h1>🇬🇷 Greek ↔ English</h1>
  <div class="scores">

<div class="card">

</div>

<div class="choices" id="choices">

  <button class="choice-btn" id="btn3"><span class="lbl">D</span><span class="val"></span></button>
</div>

<div class="feedback" id="feedback"></div>

<div class="next-wrap">

</div>

// ── Utilities ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

class Deck {
  constructor(items) { this._all = [...items]; this._pool = []; }
  draw() {
    if (!this._pool.length) { this._pool = shuffle([...this._all]); }
    return this._pool.pop();
  }
}

// ── State ────────────────────────────────────────────────────────────────────
let score   = 0;
let streak  = 0;
let best    = parseInt(localStorage.getItem('greek_best') || '0', 10);
let deck    = new Deck(WORDS);
let answered, correctAnswer, choices;

// DOM refs
const elDirection = document.getElementById('direction');
const elWord      = document.getElementById('word');
const elFeedback  = document.getElementById('feedback');
const elNext      = document.getElementById('btn-next');
const elBtns      = [0,1,2,3].map(i => document.getElementById('btn' + i));

function updateHeader() {
  document.querySelector('#lbl-score  .score-val').textContent = score;
  document.querySelector('#lbl-streak .score-val').textContent = streak;
  document.querySelector('#lbl-best   .score-val').textContent = best;
}

// ── New round ────────────────────────────────────────────────────────────────
function newRound() {
  answered = false;
  elFeedback.textContent = '';
  elFeedback.style.color = 'var(--text)';
  elNext.disabled = true;

  const [greek, english] = deck.draw();
  const dir = Math.random() < 0.5 ? 'en_to_gr' : 'gr_to_en';

  let prompt, correct, pool;
  if (dir === 'en_to_gr') {
    prompt  = english;
    correct = greek;
    pool    = WORDS.map(w => w[0]).filter(w => w !== greek);
    elDirection.textContent = 'Translate to  Greek 🇬🇷';
  } else {
    prompt  = greek;
    correct = english;
    pool    = WORDS.map(w => w[1]).filter(w => w !== english);
    elDirection.textContent = 'Translate to  English 🇬🇧';
  }

  correctAnswer = correct;
  const entryType = s => s.includes('?') ? 'question' : s.includes(' ') ? 'phrase' : 'word';
  const filtered = pool.filter(w => entryType(w) === entryType(correct));
  if (filtered.length >= 3) pool = filtered;
  shuffle(pool);
  choices = shuffle([correct, pool[0], pool[1], pool[2]]);

  elWord.textContent = prompt;

  elBtns.forEach((btn, i) => {
    btn.classList.remove('correct', 'wrong');
    btn.disabled = false;
    btn.querySelector('.val').textContent = choices[i];
  });
}

// ── Choice click ─────────────────────────────────────────────────────────────
function onChoice(i) {
  if (answered) return;
  answered = true;

  const chosen = choices[i];
  const isRight = chosen === correctAnswer;

  elBtns.forEach((btn, j) => {
    btn.disabled = true;
    if (choices[j] === correctAnswer) btn.classList.add('correct');
  });

  if (isRight) {
    score++;
    streak++;
    if (score > best) { best = score; localStorage.setItem('greek_best', best); }
    elBtns[i].classList.add('correct');
    const fire = streak > 1 ? `  🔥 ×${streak}` : '';
    elFeedback.style.color = 'var(--green)';
    elFeedback.textContent = `✔  Correct!${fire}`;
  } else {
    streak = 0;
    elBtns[i].classList.add('wrong');
    elFeedback.style.color = 'var(--red)';
    elFeedback.textContent = `✘  Wrong!   Answer: ${correctAnswer}`;
  }

  updateHeader();
  elNext.disabled = false;
}

elBtns.forEach((btn, i) => btn.addEventListener('click', () => onChoice(i)));
elNext.addEventListener('click', newRound);

// ── Init ─────────────────────────────────────────────────────────────────────
updateHeader();
newRound();

// ── Service worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
